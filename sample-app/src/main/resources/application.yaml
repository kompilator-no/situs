server:
  port: ${SERVER_PORT:8080}

runner:
  discovery-packages:
    - ${RUNNER_DISCOVERY_PACKAGES:no.testframework.sampleapp}
  concurrency: ${RUNNER_CONCURRENCY:4}
  queue-capacity: ${RUNNER_QUEUE_CAPACITY:100}
  default-timeout: ${RUNNER_DEFAULT_TIMEOUT:PT5M}
  default-retries: ${RUNNER_DEFAULT_RETRIES:1}
  security:
    jwt:
      issuer-uri: ${RUNNER_JWT_ISSUER_URI:http://localhost:8083/realms/testframework}
      audience: ${RUNNER_JWT_AUDIENCE:runner-service}
    opaque:
      enabled: ${RUNNER_OPAQUE_ENABLED:false}
      introspection-uri: ${RUNNER_OPAQUE_INTROSPECTION_URI:http://localhost:8083/oauth2/introspect}
      client-id: ${RUNNER_OPAQUE_CLIENT_ID:runner-service}
      client-secret: ${RUNNER_OPAQUE_CLIENT_SECRET:change-me}

integration:
  kafka:
    brokers: ${KAFKA_BROKERS:localhost:9092}
  services:
    orchestrator-base-url: ${ORCHESTRATOR_BASE_URL:http://localhost:8081}
    test-data-base-url: ${TESTDATA_BASE_URL:http://localhost:8082}
  auth:
    client-id: ${AUTH_CLIENT_ID:runner-service}
    client-secret: ${AUTH_CLIENT_SECRET:change-me}
    token-url: ${AUTH_TOKEN_URL:http://localhost:8083/oauth/token}
