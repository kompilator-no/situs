spring.application.name=java-spring-boot-sample-app
testframework.scan-packages=no.kompilator.sampleapp.tests

# -----------------------------------------------------------------------
# Test Framework ? Reporting Plugin
# -----------------------------------------------------------------------
# Run all discovered @TestSuite classes on startup and write
# structured report files to build/test-reports/.
#
# Formats produced (one file per suite per format):
#   TEST-{suiteName}.xml                  ? JUnit / Surefire XML (CI tools)
#   {suiteName}-open-test-report.xml      ? Open Test Reporting XML (OTR)
#   {suiteName}-report.json               ? JSON (dashboards / archiving)
#
# Output directory for report files (default: build/test-reports)
# testframework.reporting.output-dir=build/test-reports

# Formats to produce, comma-separated (default: all three)
# testframework.reporting.formats=JUNIT_XML,OPEN_TEST_REPORTING_XML,JSON
