name: finalize-central

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Central namespace to finalize (for example: no.kompilator)'
        required: true
        default: 'no.kompilator'
      publishing_type:
        description: 'Central publishing mode'
        required: true
        default: 'user_managed'
        type: choice
        options:
          - user_managed
          - automatic

jobs:
  finalize:
    runs-on: ubuntu-latest
    env:
      CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
      CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}

    steps:
      - name: Finalize uploaded artifacts in Central
        run: |
          set -euo pipefail
          TOKEN="$(printf '%s:%s' "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" | base64 | tr -d '\n')"

          curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer $TOKEN" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/${{ github.event.inputs.namespace }}?publishing_type=${{ github.event.inputs.publishing_type }}"
