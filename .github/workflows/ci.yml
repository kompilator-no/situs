name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test all subprojects
        run: |
          chmod +x java-library/gradlew
          java-library/gradlew -p . build

      - name: Upload java-library artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-library
          path: java-library/build/libs

      - name: Upload sample-app artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-app
          path: sample-app/build/libs
