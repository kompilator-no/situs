name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: java-library
            gradle-task: :java-library:build
            artifact-name: java-library
            artifact-path: java-library/build/libs
          - module: plugins
            gradle-task: :plugins:build
            artifact-name: plugins
            artifact-path: plugins/build/libs
          - module: java-spring-boot-sample-app
            gradle-task: :java-spring-boot-sample-app:build
            artifact-name: java-spring-boot-sample-app
            artifact-path: java-spring-boot-sample-app/build/libs
          - module: kotlin-spring-boot-sample-app
            gradle-task: :kotlin-spring-boot-sample-app:build
            artifact-name: kotlin-spring-boot-sample-app
            artifact-path: kotlin-spring-boot-sample-app/build/libs

    name: ${{ matrix.module }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v5

      - name: Build and test ${{ matrix.module }}
        run: |
          sed -i 's/\r//' java-library/gradlew
          chmod +x java-library/gradlew
          ./java-library/gradlew ${{ matrix.gradle-task }}

      - name: Upload ${{ matrix.module }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
