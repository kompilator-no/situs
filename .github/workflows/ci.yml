name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test java-library
        working-directory: java-library
        run: |
          echo "=== PWD ===" && pwd
          echo "=== LS ===" && ls -la
          chmod +x gradlew
          ./gradlew build publishToMavenLocal

      - name: Upload java-library artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-library
          path: java-library/build/libs

      - name: Build and test sample-app
        working-directory: sample-app
        run: |
          chmod +x ../java-library/gradlew
          ../java-library/gradlew -p . build

      - name: Upload sample-app artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-app
          path: sample-app/build/libs
