name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      java_library: ${{ steps.filter.outputs.java_library }}
      plugins: ${{ steps.filter.outputs.plugins }}
      java_spring_boot_sample_app: ${{ steps.filter.outputs.java_spring_boot_sample_app }}
      kotlin_spring_boot_sample_app: ${{ steps.filter.outputs.kotlin_spring_boot_sample_app }}

    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            java_library:
              - 'java-library/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
              - '.github/workflows/**'
            plugins:
              - 'plugins/**'
              - 'java-library/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
              - '.github/workflows/**'
            java_spring_boot_sample_app:
              - 'java-spring-boot-sample-app/**'
              - 'plugins/**'
              - 'java-library/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
              - '.github/workflows/**'
            kotlin_spring_boot_sample_app:
              - 'kotlin-spring-boot-sample-app/**'
              - 'plugins/**'
              - 'java-library/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
              - '.github/workflows/**'

  java-library:
    needs: changes
    if: ${{ needs.changes.outputs.java_library == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v5

      - name: Build and test java-library
        run: |
          set -euo pipefail
          sed -i 's/\r//' java-library/gradlew
          chmod +x java-library/gradlew
          ./java-library/gradlew :java-library:build --scan | tee gradle-java-library.log
          SCAN_URL="$(grep -o 'https://gradle.com/s/[A-Za-z0-9]*' gradle-java-library.log | tail -n 1 || true)"
          if [ -n "$SCAN_URL" ]; then
            {
              echo "### java-library Build Scan"
              echo
              echo "$SCAN_URL"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload java-library artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-library
          path: java-library/build/libs

  plugins:
    needs: changes
    if: ${{ needs.changes.outputs.plugins == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v5

      - name: Build and test plugins
        run: |
          set -euo pipefail
          sed -i 's/\r//' java-library/gradlew
          chmod +x java-library/gradlew
          ./java-library/gradlew :plugins:build --scan | tee gradle-plugins.log
          SCAN_URL="$(grep -o 'https://gradle.com/s/[A-Za-z0-9]*' gradle-plugins.log | tail -n 1 || true)"
          if [ -n "$SCAN_URL" ]; then
            {
              echo "### plugins Build Scan"
              echo
              echo "$SCAN_URL"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload plugins artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugins
          path: plugins/build/libs

  java-spring-boot-sample-app:
    needs: changes
    if: ${{ needs.changes.outputs.java_spring_boot_sample_app == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v5

      - name: Build and test java-spring-boot-sample-app
        run: |
          set -euo pipefail
          sed -i 's/\r//' java-library/gradlew
          chmod +x java-library/gradlew
          ./java-library/gradlew :java-spring-boot-sample-app:build --scan | tee gradle-java-spring-boot-sample-app.log
          SCAN_URL="$(grep -o 'https://gradle.com/s/[A-Za-z0-9]*' gradle-java-spring-boot-sample-app.log | tail -n 1 || true)"
          if [ -n "$SCAN_URL" ]; then
            {
              echo "### java-spring-boot-sample-app Build Scan"
              echo
              echo "$SCAN_URL"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload java-spring-boot-sample-app artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-spring-boot-sample-app
          path: java-spring-boot-sample-app/build/libs

  kotlin-spring-boot-sample-app:
    needs: changes
    if: ${{ needs.changes.outputs.kotlin_spring_boot_sample_app == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v5

      - name: Build and test kotlin-spring-boot-sample-app
        run: |
          set -euo pipefail
          sed -i 's/\r//' java-library/gradlew
          chmod +x java-library/gradlew
          ./java-library/gradlew :kotlin-spring-boot-sample-app:build --scan | tee gradle-kotlin-spring-boot-sample-app.log
          SCAN_URL="$(grep -o 'https://gradle.com/s/[A-Za-z0-9]*' gradle-kotlin-spring-boot-sample-app.log | tail -n 1 || true)"
          if [ -n "$SCAN_URL" ]; then
            {
              echo "### kotlin-spring-boot-sample-app Build Scan"
              echo
              echo "$SCAN_URL"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload kotlin-spring-boot-sample-app artifact
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-spring-boot-sample-app
          path: kotlin-spring-boot-sample-app/build/libs
