name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
      CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: always

      - name: Normalize release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ github.event.inputs.version }}"
          else
            RAW_VERSION="${GITHUB_REF_NAME}"
          fi
          VERSION="${RAW_VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Verify and publish release artifacts
        run: |
          set -euo pipefail
          git update-index --chmod=+x situs/gradlew
          situs/gradlew --project-dir . publishRelease --scan \
            -Pversion=${{ steps.version.outputs.VERSION }} | tee gradle-release.log
          SCAN_URL="$(grep -o 'https://gradle.com/s/[A-Za-z0-9]*' gradle-release.log | tail -n 1 || true)"
          if [ -n "$SCAN_URL" ]; then
            {
              echo "### release Build Scan"
              echo
              echo "$SCAN_URL"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Finalize uploaded artifacts in Central
        run: |
          set -euo pipefail
          TOKEN="$(printf '%s:%s' "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" | base64 | tr -d '\n')"

          curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer $TOKEN" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/no.kompilator?publishing_type=user_managed"

      - name: List built jars
        run: |
          echo "=== situs ===" && ls situs/build/libs/
          echo "=== plugins ===" && ls plugins/build/libs/

      - name: Create GitHub Release and upload jars
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.TAG }}"
          tag_name: ${{ steps.version.outputs.TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            situs/build/libs/situs-*.jar
            plugins/build/libs/plugins-*.jar
