name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build java-library and plugins with version from tag
        run: |
          git update-index --chmod=+x java-library/gradlew
          java-library/gradlew --project-dir . :java-library:build :plugins:build \
            -Pversion=${{ steps.version.outputs.VERSION }}

      - name: List built jars
        run: |
          echo "=== java-library ===" && ls java-library/build/libs/
          echo "=== plugins ===" && ls plugins/build/libs/

      - name: Create GitHub Release and upload jars
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            java-library/build/libs/java-library-*.jar
            plugins/build/libs/plugins-*.jar
