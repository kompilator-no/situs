name: release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on tags like v0.1.0, v1.2.3

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub releases and upload assets

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build all projects
        working-directory: java-library
        run: |
          sed -i 's/\r//' gradlew
          chmod +x gradlew
          ./gradlew -p .. build \
            -Pversion=${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release and upload jars
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            java-library/build/libs/java-library-${{ steps.version.outputs.VERSION }}.jar
            java-library/build/libs/java-library-${{ steps.version.outputs.VERSION }}-sources.jar
            java-library/build/libs/java-library-${{ steps.version.outputs.VERSION }}-javadoc.jar
            plugins/build/libs/plugins-${{ steps.version.outputs.VERSION }}.jar
            plugins/build/libs/plugins-${{ steps.version.outputs.VERSION }}-sources.jar
