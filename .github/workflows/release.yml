name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
      CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Verify and publish release artifacts
        run: |
          git update-index --chmod=+x java-library/gradlew
          java-library/gradlew --project-dir . publishRelease \
            -Pversion=${{ steps.version.outputs.VERSION }}

      - name: Finalize uploaded artifacts in Central
        run: |
          set -euo pipefail
          TOKEN="$(printf '%s:%s' "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" | base64 | tr -d '\n')"

          curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer $TOKEN" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/no.kompilator?publishing_type=user_managed"

      - name: List built jars
        run: |
          echo "=== java-library ===" && ls java-library/build/libs/
          echo "=== plugins ===" && ls plugins/build/libs/

      - name: Create GitHub Release and upload jars
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            java-library/build/libs/java-library-*.jar
            plugins/build/libs/plugins-*.jar
